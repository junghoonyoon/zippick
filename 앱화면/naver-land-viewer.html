<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <title>네이버 부동산</title>
  <style>
    :root {
      --viewer-header-height: 58px;
      --viewer-safe-top: env(safe-area-inset-top, 0px);
    }
    * { box-sizing: border-box; }
    html, body {
      width: 100%;
      height: 100%;
      margin: 0;
      overflow: hidden;
      background: #fff;
      color: #111;
      font-family: -apple-system, BlinkMacSystemFont, "Apple SD Gothic Neo", "Noto Sans KR", sans-serif;
    }
    .viewer-shell {
      display: flex;
      flex-direction: column;
      width: 100%;
      height: 100%;
      min-height: 100dvh;
      background: #fff;
    }
    .viewer-header {
      display: grid;
      grid-template-columns: 56px minmax(0, 1fr) 56px;
      align-items: center;
      min-height: calc(var(--viewer-header-height) + var(--viewer-safe-top));
      padding: var(--viewer-safe-top) 10px 0;
      border-bottom: 1px solid #f0f1f3;
      background: #fff;
      flex: 0 0 auto;
      z-index: 2;
    }
    .viewer-back {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      width: 44px;
      height: 44px;
      border: 0;
      border-radius: 999px;
      background: transparent;
      color: #111;
      cursor: pointer;
    }
    .viewer-back:active { background: #f2f4f6; }
    .viewer-back svg {
      width: 28px;
      height: 28px;
      stroke-width: 2.5;
    }
    .viewer-title {
      min-width: 0;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
      font-size: 20px;
      font-weight: 800;
      letter-spacing: 0;
      text-align: left;
    }
    .viewer-frame-wrap {
      position: relative;
      flex: 1 1 auto;
      min-height: 0;
      background: #fff;
    }
    .viewer-frame {
      display: block;
      width: 100%;
      height: 100%;
      border: 0;
      background: #fff;
    }
    .viewer-fallback {
      position: absolute;
      inset: 0;
      display: none;
      align-items: center;
      justify-content: center;
      padding: 28px;
      background: #fff;
      text-align: center;
    }
    .viewer-fallback.is-visible { display: flex; }
    .viewer-fallback-inner {
      max-width: 320px;
    }
    .viewer-fallback-title {
      margin: 0 0 8px;
      font-size: 18px;
      font-weight: 900;
    }
    .viewer-fallback-copy {
      margin: 0 0 18px;
      color: #555;
      font-size: 14px;
      line-height: 1.5;
    }
    .viewer-open {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-height: 44px;
      padding: 0 18px;
      border-radius: 999px;
      background: #111;
      color: #fff;
      font-size: 15px;
      font-weight: 800;
      text-decoration: none;
    }
  </style>
</head>
<body>
  <main class="viewer-shell">
    <header class="viewer-header">
      <button class="viewer-back" type="button" aria-label="매수후보 화면으로 돌아가기">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" aria-hidden="true">
          <path d="M15 18l-6-6 6-6" stroke-linecap="round" stroke-linejoin="round"></path>
        </svg>
      </button>
      <div class="viewer-title" data-viewer-title>네이버 부동산</div>
      <div aria-hidden="true"></div>
    </header>
    <section class="viewer-frame-wrap">
      <iframe class="viewer-frame" title="네이버 부동산 단지 화면" referrerpolicy="strict-origin-when-cross-origin"></iframe>
      <div class="viewer-fallback" data-fallback>
        <div class="viewer-fallback-inner">
          <p class="viewer-fallback-title">네이버 화면을 바로 열게요</p>
          <p class="viewer-fallback-copy">네이버가 앱 안 표시를 막으면 새 화면으로 열어야 해요.</p>
          <a class="viewer-open" data-open-link rel="noopener noreferrer">네이버 부동산 열기</a>
        </div>
      </div>
    </section>
  </main>
  <script>
    const params = new URLSearchParams(window.location.search);
    const rawUrl = params.get("url") || "";
    const rawTitle = params.get("title") || "네이버 부동산";
    const title = rawTitle.trim() || "네이버 부동산";
    const titleEl = document.querySelector("[data-viewer-title]");
    const frame = document.querySelector(".viewer-frame");
    const fallback = document.querySelector("[data-fallback]");
    const openLink = document.querySelector("[data-open-link]");
    titleEl.textContent = title;
    document.title = `${title} - 네이버 부동산`;

    function safeNaverUrl(value) {
      try {
        const url = new URL(value);
        if (url.protocol !== "https:" || url.hostname !== "fin.land.naver.com") return "";
        if (!/^\/complexes\/\d+/.test(url.pathname)) return "";
        return url.toString();
      } catch (_) {
        return "";
      }
    }

    function goBack() {
      if (window.history.length > 1) {
        window.history.back();
        return;
      }
      window.location.assign("/");
    }

    document.querySelector(".viewer-back").addEventListener("click", goBack);

    const targetUrl = safeNaverUrl(rawUrl);
    if (!targetUrl) {
      fallback.classList.add("is-visible");
      openLink.removeAttribute("href");
    } else {
      openLink.href = targetUrl;
      const frameUrl = `/naver-land-frame?url=${encodeURIComponent(targetUrl)}`;
      frame.addEventListener("load", () => {
        try {
          const text = frame.contentDocument?.body?.innerText || "";
          if (/Error response|Bad Gateway|502|네이버 화면을 불러오지 못했어요/.test(text)) {
            fallback.classList.add("is-visible");
          }
        } catch (_) {}
      });
      frame.src = frameUrl;
      window.setTimeout(() => {
        try {
          // If the proxied frame fails before it creates a browsing context,
          // show a clear exit.
          if (!frame.contentWindow) fallback.classList.add("is-visible");
        } catch (_) {}
      }, 1800);
    }
  </script>
</body>
</html>
